
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login | ShopEase</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #1f2933, #111827);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 380px;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #111827;
    }

    .input-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.9rem;
      margin-bottom: 0.4rem;
      color: #374151;
    }

    input {
      width: 100%;
      padding: 0.7rem;
      border-radius: 6px;
      border: 1px solid #d1d5db;
    }

    input:focus {
      outline: none;
      border-color: #111827;
    }

    button {
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 6px;
      background: #111827;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background: #000000;
    }

    .links {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .links a {
      color: #111827;
      text-decoration: none;
      font-weight: 600;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="card">
    <h2>Admin Login 🔐</h2>

    <form>
      <div class="input-group">
        <label>Admin Email</label>
        <input type="email" placeholder="admin@example.com" required />
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="••••••••" required />
      </div>

      <button type="submit">Login</button>
    </form>

    <div class="links">
      <p>New admin? <a href="admin-register.html">Register here</a></p>
    </div>
  </div>

</body>
</html>
